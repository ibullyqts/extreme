name: Titan Python Engine

on:
  workflow_dispatch: # This allows you to start it manually with a button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 🛠️ Check out your repository code so the runner can see praveer_v109s.py
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 🐍 Set up Python (Removed 'cache' to prevent the error you saw)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 📦 Install the 'instagrapi' library directly
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install instagrapi

      # 4. 🚀 Run your Python script
      - name: Run Titan Engine
        env:
          INSTA_SESSION_ID: ${{ secrets.INSTA_SESSION_ID }}
          MESSAGES: ${{ secrets.MESSAGES }}
        run: python praveer_v109s.py
