name: PRAVEER.OWNS API-TITAN-SECURE
on:
  schedule:
    # Trigger every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual start

jobs:
  api-strike:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Spins up 3 machines (Total 24 API Agents)
        machine: [1, 2, 3]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Axios
        run: npm install axios

      - name: Start Secure API Flood
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          MESSAGES: ${{ secrets.MESSAGES }}
          MACHINE_ID: ${{ matrix.machine }}
        # Ensure your file is named praveer_v109s.js in your repo
        run: node praveer_v109s.js
