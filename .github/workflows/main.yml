name: PRAVEER.OWNS API-TITAN-FINAL
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  api-strike:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        machine: [1, 2, 3]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        # 🔥 Added 'qs' here to fix the 404/Data format issue
        run: npm install axios qs 

      - name: Start Final API Strike
        env:
          INSTA_COOKIE: ${{ secrets.INSTA_COOKIE }}
          TARGET_THREAD_ID: ${{ secrets.TARGET_THREAD_ID }}
          MESSAGES: ${{ secrets.MESSAGES }}
          MACHINE_ID: ${{ matrix.machine }}
        run: node praveer_v109s.js
